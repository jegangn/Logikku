[project]
name = "logikku-gen"
version = "0.1.0"
description = "Offline puzzle generator for Logikku"
requires-python = ">=3.12"
dependencies = [
  "click >= 8.1",
]

[project.optional-dependencies]
test = ["pytest >= 8.0"]
z3 = ["z3-solver >= 4.13"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.setuptools.packages.find]
where = ["src"]
